name: Aplicar migraciones Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**.sql"
      - ".github/workflows/supabase-migrate.yml"

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verificar conexión protegida
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "::error::Falta el secreto SUPABASE_DB_PASSWORD en GitHub."
            exit 1
          fi

      - name: Aplicar migraciones en orden
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          migrations=(
            "supabase/complete_audit.sql"
            "supabase/institutional_notifications.sql"
            "supabase/technical_operations.sql"
            "supabase/integrated_module_persistence.sql"
            "supabase/hr_organization_hierarchy.sql"
            "supabase/hr_payroll_budget.sql"
            "supabase/hr_payroll_execution.sql"
            "supabase/hr_payroll_processing.sql"
            "supabase/hr_position_catalog.sql"
            "supabase/hr_personnel_actions.sql"
            "supabase/hr_employee_cases.sql"
            "supabase/system_module_integration.sql"
            "supabase/project_catalog_relations.sql"
            "supabase/institutional_reports.sql"
          )
          for migration in "${migrations[@]}"; do
            echo "Aplicando $migration"
            psql -h aws-1-us-west-2.pooler.supabase.com -p 5432 -U postgres.tytbnwhrxznxmfjcrfdx -d postgres -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Confirmar tablas principales
        shell: bash
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          psql -h aws-1-us-west-2.pooler.supabase.com -p 5432 -U postgres.tytbnwhrxznxmfjcrfdx -d postgres -v ON_ERROR_STOP=1 -c "
            select table_name
            from information_schema.tables
            where table_schema='public'
              and table_name in (
                'complete_audit_log',
                'app_notifications',
                'technical_error_log',
                'organization_units',
                'institutional_projects',
                'hr_employees',
                'hr_employee_files'
                ,'hr_payroll_budget_lines'
                ,'hr_payroll_budget_caps'
                ,'hr_payroll_runs'
                ,'hr_payroll_run_lines'
                ,'hr_employee_history'
                ,'hr_payroll_batches'
                ,'hr_payroll_batch_lines'
                ,'hr_employee_benefits'
                ,'hr_employee_payroll_assignments'
                ,'hr_payroll_account_catalog'
                ,'hr_personnel_actions'
                ,'hr_vacancies'
                ,'hr_employee_cases'
                ,'hr_position_catalog'
                ,'administrative_catalogs'
                ,'technical_projects'
                ,'budget_account_catalog'
                ,'procurement_process_catalog'
                ,'supplier_catalog'
              )
            order by table_name;"
